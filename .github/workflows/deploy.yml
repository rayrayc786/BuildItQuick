name: Deploy to VPS

on:
  push:
    branches:
      - main
      - newUI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Copy Build to Server
        uses: appleboy/scp-action@master
        with:
          host: 195.35.21.157
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: "frontend/dist/*"
          target: "/var/www/MatAll/frontend_new"
          strip_components: 2

      - name: Update Backend and Finalize
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.35.21.157
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e
            mkdir -p /var/www/MatAll
            cd /var/www/MatAll
            
            # Update backend code
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}
            
            # Backend Setup
            echo "Setting up Backend..."
            cd Backend
            npm install --legacy-peer-deps
            pm2 reload matall-backend --update-env || pm2 start server.js --name "matall-backend"
            pm2 save
            
            # Deploy Frontend (moving from temp to live)
            echo "Updating live frontend..."
            sudo rm -rf /var/www/html/*
            sudo cp -r /var/www/MatAll/frontend_new/* /var/www/html/
            sudo rm -rf /var/www/MatAll/frontend_new
            
            sudo systemctl restart nginx
            echo "Deployment successful!"