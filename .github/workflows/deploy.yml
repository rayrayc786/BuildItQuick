name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.35.21.157
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/MatAll
            git pull origin main

            # Backend
            cd Backend
            npm install
            pm2 restart all

            # Frontend
            cd ../frontend
            npm install
            npm run build

            # Clean + copy
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/

            # Restart nginx
            sudo systemctl restart nginx